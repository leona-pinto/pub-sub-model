<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Dashboard - Scaling Test</title>
  <link rel="stylesheet" href="css/smartHome-style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Smart Home Dashboard - 8 Devices</h1>
    </header>

    <div class="content-grid">
      <!-- Car Location Card -->
      <section class="card location-card">
        <h2>Car Location</h2>
        <div class="data-grid">
          <div class="data-item">
            <label>Latitude:</label>
            <span id="latitude" class="value">--</span>
          </div>
          <div class="data-item">
            <label>Longitude:</label>
            <span id="longitude" class="value">--</span>
          </div>
          <div class="data-item">
            <label>Distance:</label>
            <span id="distance" class="value"><strong id="distance-value">--</strong> km</span>
          </div>
        </div>
      </section>

      <!-- Temperature Card -->
      <section class="card temperature-card">
        <h2>Temperature</h2>
        <div class="data-grid">
          <div class="data-item">
            <label>Current Temp:</label>
            <span id="temperature-value" class="value">-- °C</span>
          </div>
        </div>
      </section>

      <!-- HVAC Card -->
      <section class="card hvac-card">
        <h2>HVAC</h2>
        <div class="status-display" id="hvac-status">
          <div class="status-text" id="hvac-text">OFF</div>
        </div>
        <div class="hvac-mode" id="hvac-mode" style="display: none;">
          <span id="hvac-mode-text">--</span>
        </div>
      </section>

      <!-- Smart TV Card -->
      <section class="card tv-card">
        <h2>Smart TV</h2>
        <div class="status-display" id="tv-status">
          <div class="status-text" id="tv-text">OFF</div>
        </div>
      </section>

      <!-- Barbecue Card -->
      <section class="card barbecue-card">
        <h2>Barbecue</h2>
        <div class="status-display" id="barbecue-status">
          <div class="status-text" id="barbecue-text">OFF</div>
        </div>
      </section>

      <!-- Fan Card -->
      <section class="card fan-card">
        <h2>Fan</h2>
        <div class="status-display" id="fan-status">
          <div class="status-text" id="fan-text">OFF</div>
        </div>
      </section>

      <!-- Air Purifier Card -->
      <section class="card air-purifier-card">
        <h2>Air Purifier</h2>
        <div class="status-display" id="air-purifier-status">
          <div class="status-text" id="air-purifier-text">OFF</div>
        </div>
      </section>

      <!-- Dryer Card -->
      <section class="card dryer-card">
        <h2>Dryer</h2>
        <div class="status-display" id="dryer-status">
          <div class="status-text" id="dryer-text">OFF</div>
        </div>
      </section>

      <!-- Oven Card -->
      <section class="card oven-card">
        <h2>Oven</h2>
        <div class="status-display" id="oven-status">
          <div class="status-text" id="oven-text">OFF</div>
        </div>
      </section>

      <!-- Washing Machine Card -->
      <section class="card washing-machine-card">
        <h2>Washing Machine</h2>
        <div class="status-display" id="washing-machine-status">
          <div class="status-text" id="washing-machine-text">OFF</div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/smartHome-app-scalable.js"></script>
</body>
</html>
